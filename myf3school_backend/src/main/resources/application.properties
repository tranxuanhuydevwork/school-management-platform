spring.application.name=myf3school_backend

spring.datasource.url=jdbc:mysql://localhost:3306/myf3school
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=f3school-super-secret-key-for-hs512-algorithm-must-be-64-chars-min!

# Spring Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_email_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio SMS & MFA
twilio.account-sid=your_twilio_account_sid
twilio.auth-token=your_twilio_auth_token
twilio.from-number=your_twilio_from_number

spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=10

# Thymeleaf Template Engine
spring.thymeleaf.prefix=classpath:/templates/view/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Static resources (/static/css, /static/js)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# SSE Timeout configuration
spring.mvc.async.request-timeout=310000
