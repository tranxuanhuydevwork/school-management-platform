<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}} — MyF3School Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/theme.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    {{extraCss}}
</head>
<body>

<!-- ═══════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-mark"><span>F3</span></div>
            <div class="logo-text">
                <strong>MyF3School</strong>
                <small>Admin Portal</small>
            </div>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Thu/mở sidebar">
            <i class="bi bi-layout-sidebar-reverse"></i>
        </button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-group">
            <span class="nav-label">Tổng quan</span>
            <a href="/admin/dashboard" class="nav-item {{#if isDashboard}}active{{/if}}">
                <i class="bi bi-grid-1x2"></i><span>Dashboard</span>
            </a>
        </div>

        <div class="nav-group">
            <span class="nav-label">Học tập</span>
            <a href="/admin/courses" class="nav-item {{#if isCourse}}active{{/if}}">
                <i class="bi bi-journal-bookmark"></i><span>Môn học &amp; Lớp</span>
            </a>
            <a href="/admin/grades" class="nav-item {{#if isGrade}}active{{/if}}">
                <i class="bi bi-bar-chart-steps"></i><span>Điểm số</span>
            </a>
            <a href="/admin/attendance" class="nav-item {{#if isAttendance}}active{{/if}}">
                <i class="bi bi-person-check"></i><span>Điểm danh</span>
            </a>
        </div>

        <div class="nav-group">
            <span class="nav-label">Quản lý</span>
            <a href="/admin/accounts" class="nav-item {{#if isAccount}}active{{/if}}">
                <i class="bi bi-people"></i><span>Tài khoản</span>
                <span class="badge" id="sidebarAccountBadge" style="display:none"></span>
            </a>
            <a href="/admin/applications" class="nav-item {{#if isApplication}}active{{/if}}">
                <i class="bi bi-file-earmark-text"></i><span>Đơn từ</span>
                <span class="badge badge-warn" id="sidebarAppBadge" style="display:none"></span>
            </a>
            <a href="/admin/clubs" class="nav-item {{#if isClub}}active{{/if}}">
                <i class="bi bi-collection"></i><span>Câu lạc bộ</span>
            </a>
        </div>

        <div class="nav-group">
            <span class="nav-label">Hệ thống</span>
            <a href="/admin/notifications" class="nav-item {{#if isNotif}}active{{/if}}">
                <i class="bi bi-bell"></i><span>Thông báo</span>
                <span class="badge badge-accent" id="sidebarNotifBadge" style="display:none"></span>
            </a>
            <a href="/admin/settings" class="nav-item {{#if isSetting}}active{{/if}}">
                <i class="bi bi-sliders"></i><span>Cài đặt</span>
            </a>
        </div>
    </nav>

    <div class="sidebar-footer">
        <div class="user-chip" id="currentUserChip">
            <div class="user-avatar" id="sidebarAvatar">A</div>
            <div class="user-info">
                <span class="user-name" id="sidebarUserName">Admin</span>
                <span class="user-role" id="sidebarUserRole">Administrator</span>
            </div>
        </div>
        <a href="/auth/logout" class="logout-btn" title="Đăng xuất">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</aside>

<!-- ═══════════════════════════════════════════
     MAIN WRAPPER
═══════════════════════════════════════════ -->
<div class="main-wrapper" id="mainWrapper">

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="topbar-btn topbar-toggle-mobile" id="mobileSidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            <div class="breadcrumb-trail" id="breadcrumb">
                <span>{{breadcrumb}}</span>
            </div>
        </div>

        <div class="topbar-right">
            <!-- Live clock -->
            <div class="live-clock" id="liveClock"></div>

            <!-- Real-time indicator -->
            <div class="rt-indicator" id="rtIndicator" title="Kết nối thời gian thực">
                <span class="rt-dot"></span>
                <span class="rt-label">Live</span>
            </div>

            <!-- Notification bell -->
            <button class="topbar-btn notif-btn" id="topbarNotifBtn" aria-label="Thông báo">
                <i class="bi bi-bell"></i>
                <span class="notif-count" id="topbarNotifCount" style="display:none">0</span>
            </button>

            <!-- Notification dropdown -->
            <div class="notif-dropdown" id="notifDropdown">
                <div class="notif-header">
                    <span>Thông báo</span>
                    <button class="mark-all-read" id="markAllReadBtn">Đọc tất cả</button>
                </div>
                <div class="notif-list" id="notifList">
                    <div class="notif-empty">Không có thông báo mới</div>
                </div>
            </div>

            <!-- Theme toggle -->
            <button class="topbar-btn" id="themeToggle" aria-label="Chuyển theme">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content" id="pageContent">
        {{content}}
    </main>

</div>

<!-- ═══════════════════════════════════════════
     TOAST CONTAINER
═══════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- Confirm dialog (injected by theme.js if needed) -->

<!-- Scripts -->
<script>
    // Server injects these values
    window.F3_USER_ID  = {userId};   // e.g. 1
    window.F3_API_BASE = '{{apiBase}}'; // e.g. '/api'
</script>
<script src="/static/js/theme.js"></script>
<script src="/static/js/realtime.js"></script>
<script src="/static/js/layout.js"></script>
{{extraJs}}
</body>
</html>
